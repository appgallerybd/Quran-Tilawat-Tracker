<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কুরআন তেলাওয়াত ট্র্যাকার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #C9A84C;
  --gold-light: #E8C97E;
  --gold-dark: #8B6914;
  --green-deep: #0D2818;
  --green-mid: #1B4332;
  --green-hover: #2D6A4F;
  --green-accent: #52B788;
  --cream: #F8F4E8;
  --cream-dark: #EDE8D5;
  --text-dim: rgba(248,244,232,0.55);
}

body {
  font-family: 'Noto Serif Bengali', serif;
  background: #0a1a0f;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 1rem;
}

.app {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(160deg, #0D2818 0%, #1B4332 50%, #0D2818 100%);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.gold-line {
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, var(--green-deep), var(--gold), var(--gold-light), var(--gold), var(--green-deep));
}

.header {
  text-align: center;
  padding: 1.5rem 1.5rem 0.8rem;
}

.bismillah {
  font-family: 'Amiri', serif;
  font-size: 2rem;
  color: var(--gold-light);
  letter-spacing: 3px;
  text-shadow: 0 0 25px rgba(201,168,76,0.25);
  margin-bottom: 0.5rem;
}

.app-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: 1px;
}

.app-sub {
  font-size: 0.75rem;
  color: var(--gold-light);
  opacity: 0.75;
  margin-top: 3px;
}

.divider {
  width: 70%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0.9rem auto;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 0 1.2rem 1rem;
}

.stat-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 0.7rem 0.4rem;
  text-align: center;
}

.stat-val {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold-light);
}

.stat-lbl {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 3px;
}

.section { padding: 0 1.2rem; margin-bottom: 1rem; }

.sec-title {
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,76,0.35), transparent);
}

.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
  height: 7px;
  overflow: hidden;
  margin-bottom: 5px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-accent), var(--gold));
  border-radius: 6px;
  transition: width 0.6s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-dim);
}

.current-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 14px;
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.9rem;
  position: relative;
  overflow: hidden;
}
.current-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--green-accent));
}

.cur-icon {
  width: 44px;
  height: 44px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.cur-info { flex: 1; min-width: 0; }
.cur-surah {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cur-detail { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
.cur-date { font-size: 0.65rem; color: var(--gold-light); opacity: 0.7; margin-top: 3px; }

.juz-badge {
  display: inline-block;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 5px;
  padding: 1px 7px;
  font-size: 0.65rem;
  color: var(--gold-light);
}

.btn-update {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 8px;
  color: var(--gold-light);
  padding: 6px 12px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  flex-shrink: 0;
}
.btn-update:hover { background: rgba(201,168,76,0.28); }

.form-panel {
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 14px;
  padding: 1rem;
  margin-top: 10px;
  display: none;
}
.form-panel.open { display: block; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-lbl {
  font-size: 0.68rem;
  color: var(--gold-light);
  opacity: 0.8;
}

select, input[type="text"] {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 8px;
  color: var(--cream);
  padding: 8px 10px;
  font-size: 0.8rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
select option { background: #1B4332; }
select:focus, input:focus { border-color: rgba(201,168,76,0.55); }

.btn-save {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none;
  border-radius: 10px;
  color: #1A1A08;
  padding: 10px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
  transition: opacity 0.2s;
  margin-top: 4px;
}
.btn-save:hover { opacity: 0.88; }

.history-list { display: flex; flex-direction: column; gap: 7px; }

.h-item {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 0.6rem 0.9rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: background 0.15s;
}
.h-item:hover { background: rgba(255,255,255,0.07); }

.h-left {}
.h-surah { font-size: 0.8rem; color: var(--cream); font-weight: 600; }
.h-detail { font-size: 0.67rem; color: var(--text-dim); margin-top: 2px; }
.h-right { display: flex; align-items: center; gap: 4px; }
.h-date { font-size: 0.67rem; color: var(--gold-light); opacity: 0.65; text-align: right; }

.btn-del {
  background: transparent;
  border: none;
  color: rgba(248,244,232,0.22);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.2s;
  margin-left: 4px;
}
.btn-del:hover { color: #E24B4A; background: rgba(226,75,74,0.12); }

.empty {
  text-align: center;
  padding: 1.5rem;
  color: rgba(248,244,232,0.3);
  font-size: 0.78rem;
  line-height: 1.9;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-hover);
  border: 1px solid var(--gold);
  color: var(--cream);
  padding: 9px 20px;
  border-radius: 30px;
  font-size: 0.78rem;
  font-family: 'Noto Serif Bengali', serif;
  transition: transform 0.3s ease;
  z-index: 100;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
.pulse { animation: pulse 1.6s ease-in-out infinite; }

.bottom-space { height: 1.5rem; }
</style>
</head>
<body>
<div class="app">
  <div class="gold-line"></div>

  <div class="header">
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="app-title">কুরআন তেলাওয়াত ট্র্যাকার</div>
    <div class="app-sub">প্রতিদিনের তেলাওয়াত রেকর্ড করুন</div>
  </div>

  <div class="divider"></div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="st-days">০</div>
      <div class="stat-lbl">মোট রেকর্ড</div>
    </div>
    <div class="stat-box">
      <div class="stat-val"><span class="pulse" style="display:inline-block">🔥</span> <span id="st-streak">০</span></div>
      <div class="stat-lbl">ধারাবাহিক দিন</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="st-juz">০/৩০</div>
      <div class="stat-lbl">পারা সম্পন্ন</div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">মোট অগ্রগতি</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span id="prog-lbl">শুরু হয়নি</span>
      <span id="prog-pct">০%</span>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">সর্বশেষ অবস্থান</div>
    <div class="current-card">
      <div class="cur-icon">📖</div>
      <div class="cur-info">
        <div class="cur-surah" id="cur-surah">এখনও শুরু করা হয়নি</div>
        <div class="cur-detail" id="cur-detail">সূরা ও আয়াত নির্বাচন করুন</div>
        <div class="cur-date" id="cur-date">—</div>
      </div>
      <button class="btn-update" onclick="toggleForm()">আপডেট করুন</button>
    </div>

    <div class="form-panel" id="form-panel">
      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl">সূরা</label>
          <select id="sel-surah" onchange="updateAyah()"></select>
        </div>
        <div class="form-group">
          <label class="form-lbl">আয়াত</label>
          <select id="sel-ayah"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl">পারা (জুয)</label>
          <select id="sel-juz"></select>
        </div>
        <div class="form-group">
          <label class="form-lbl">নোট (ঐচ্ছিক)</label>
          <input type="text" id="inp-note" placeholder="যেমন: ফজরের পরে" maxlength="40">
        </div>
      </div>
      <button class="btn-save" onclick="saveEntry()">✦ সংরক্ষণ করুন</button>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">তেলাওয়াতের ইতিহাস</div>
    <div class="history-list" id="hist-list">
      <div class="empty">এখনও কোনো রেকর্ড নেই।<br>উপরে আপডেট করুন।</div>
    </div>
  </div>

  <div class="gold-line"></div>
  <div class="bottom-space"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SURAHS = [
  ["আল-ফাতিহা",7],["আল-বাকারা",286],["আল-ইমরান",200],["আন-নিসা",176],["আল-মায়িদা",120],
  ["আল-আনআম",165],["আল-আরাফ",206],["আল-আনফাল",75],["আত-তাওবা",129],["ইউনুস",109],
  ["হুদ",123],["ইউসুফ",111],["আর-রাদ",43],["ইবরাহিম",52],["আল-হিজর",99],
  ["আন-নাহল",128],["আল-ইসরা",111],["আল-কাহফ",110],["মারইয়াম",98],["তা-হা",135],
  ["আল-আম্বিয়া",112],["আল-হাজ্জ",78],["আল-মুমিনুন",118],["আন-নুর",64],["আল-ফুরকান",77],
  ["আশ-শুআরা",227],["আন-নামল",93],["আল-কাসাস",88],["আল-আনকাবুত",69],["আর-রুম",60],
  ["লুকমান",34],["আস-সাজদা",30],["আল-আহজাব",73],["সাবা",54],["ফাতির",45],
  ["ইয়া-সিন",83],["আস-সাফফাত",182],["সাদ",88],["আয-যুমার",75],["গাফির",85],
  ["ফুসসিলাত",54],["আশ-শুরা",53],["আয-যুখরুফ",89],["আদ-দুখান",59],["আল-জাসিয়া",37],
  ["আল-আহকাফ",35],["মুহাম্মদ",38],["আল-ফাতহ",29],["আল-হুজুরাত",18],["কাফ",45],
  ["আয-যারিয়াত",60],["আত-তুর",49],["আন-নাজম",62],["আল-কামার",55],["আর-রাহমান",78],
  ["আল-ওয়াকিআ",96],["আল-হাদিদ",29],["আল-মুজাদিলা",22],["আল-হাশর",24],["আল-মুমতাহিনা",13],
  ["আস-সাফ",14],["আল-জুমুআ",11],["আল-মুনাফিকুন",11],["আত-তাগাবুন",18],["আত-তালাক",12],
  ["আত-তাহরিম",12],["আল-মুলক",30],["আল-কালাম",52],["আল-হাক্কা",52],["আল-মাআরিজ",44],
  ["নুহ",28],["আল-জিন",28],["আল-মুজ্জাম্মিল",20],["আল-মুদ্দাসির",56],["আল-কিয়ামা",40],
  ["আল-ইনসান",31],["আল-মুরসালাত",50],["আন-নাবা",40],["আন-নাযিআত",46],["আবাসা",42],
  ["আত-তাকবির",29],["আল-ইনফিতার",19],["আল-মুতাফফিফিন",36],["আল-ইনশিকাক",25],["আল-বুরুজ",22],
  ["আত-তারিক",17],["আল-আলা",19],["আল-গাশিয়া",26],["আল-ফাজর",30],["আল-বালাদ",20],
  ["আশ-শামস",15],["আল-লায়ল",21],["আদ-দুহা",11],["আশ-শারহ",8],["আত-তিন",8],
  ["আল-আলাক",19],["আল-কাদর",5],["আল-বাইয়িনা",8],["আয-যালযালা",8],["আল-আদিয়াত",11],
  ["আল-কারিআ",11],["আত-তাকাসুর",8],["আল-আসর",3],["আল-হুমাযা",9],["আল-ফিল",5],
  ["কুরাইশ",4],["আল-মাউন",7],["আল-কাউসার",3],["আল-কাফিরুন",6],["আন-নাসর",3],
  ["আল-মাসাদ",5],["আল-ইখলাস",4],["আল-ফালাক",5],["আন-নাস",6]
];

const TOTAL = SURAHS.reduce((s,[,a])=>s+a,0);
let data = { history: [] };

function toLocal(num) {
  return num.toString().replace(/[0-9]/g, d => '০১২৩৪৫৬৭৮৯'[d]);
}

function load() {
  try { const d = localStorage.getItem('qt_v3'); if(d) data = JSON.parse(d); } catch(e){}
}
function save() {
  try { localStorage.setItem('qt_v3', JSON.stringify(data)); } catch(e){}
}

function init() {
  const ss = document.getElementById('sel-surah');
  SURAHS.forEach(([n,a],i) => {
    const o = document.createElement('option');
    o.value = i+1;
    o.textContent = `${i+1}. ${n} (${a})`;
    ss.appendChild(o);
  });
  const sj = document.getElementById('sel-juz');
  const none = document.createElement('option');
  none.value = ''; none.textContent = 'পারা নির্বাচন করুন';
  sj.appendChild(none);
  for(let i=1;i<=30;i++){
    const o = document.createElement('option');
    o.value = i; o.textContent = `পারা ${toLocal(i)}`;
    sj.appendChild(o);
  }
  updateAyah();
  render();
}

function updateAyah() {
  const si = parseInt(document.getElementById('sel-surah').value)-1;
  const max = SURAHS[si][1];
  const sa = document.getElementById('sel-ayah');
  const prev = parseInt(sa.value)||1;
  sa.innerHTML='';
  for(let i=1;i<=max;i++){
    const o=document.createElement('option');
    o.value=i; o.textContent=`${toLocal(i)} নং আয়াত`;
    sa.appendChild(o);
  }
  sa.value = Math.min(prev,max);
}

function toggleForm() {
  const f = document.getElementById('form-panel');
  f.classList.toggle('open');
  if(f.classList.contains('open') && data.history.length>0) {
    const l = data.history[0];
    document.getElementById('sel-surah').value = l.s;
    updateAyah();
    document.getElementById('sel-ayah').value = l.a;
    if(l.j) document.getElementById('sel-juz').value = l.j;
  }
}

function calcProg(s,a) {
  let t=0;
  for(let i=0;i<s-1;i++) t+=SURAHS[i][1];
  return t+a;
}

function getToday() {
  return new Date().toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});
}
function getTodayKey() {
  return new Date().toISOString().slice(0,10);
}

function calcStreak() {
  if(!data.history.length) return 0;
  const dates = [...new Set(data.history.map(h=>h.dk))].sort().reverse();
  const today = getTodayKey();
  const yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(dates[0]!==today && dates[0]!==yest) return 0;
  const d = new Date(dates[0]);
  let streak=0;
  for(const dk of dates){
    if(dk===d.toISOString().slice(0,10)){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}

function render() {
  const latest = data.history[0];
  if(latest){
    const sn = SURAHS[latest.s-1][0];
    document.getElementById('cur-surah').textContent = `${toLocal(latest.s)}. ${sn}`;
    const jBadge = latest.j ? ` <span class="juz-badge">পারা ${toLocal(latest.j)}</span>`:'';
    document.getElementById('cur-detail').innerHTML = `${toLocal(latest.a)} নং আয়াত${jBadge}`;
    document.getElementById('cur-date').textContent = latest.d;
    const done = calcProg(latest.s, latest.a);
    const pct = Math.round((done/TOTAL)*100);
    document.getElementById('prog-fill').style.width = pct+'%';
    document.getElementById('prog-pct').textContent = toLocal(pct)+'%';
    document.getElementById('prog-lbl').textContent = `${toLocal(done)} / ${toLocal(TOTAL)} আয়াত`;
  }

  const streak = calcStreak();
  document.getElementById('st-days').textContent = toLocal(data.history.length);
  document.getElementById('st-streak').textContent = toLocal(streak);
  const maxJuz = latest?.j || 0;
  document.getElementById('st-juz').textContent = `${toLocal(maxJuz)}/৩০`;

  const list = document.getElementById('hist-list');
  if(!data.history.length){
    list.innerHTML = '<div class="empty">এখনও কোনো রেকর্ড নেই।<br>উপরে আপডেট করুন।</div>';
    return;
  }
  list.innerHTML = data.history.slice(0,20).map((h,i)=>{
    const nm = SURAHS[h.s-1][0];
    return `<div class="h-item">
      <div class="h-left">
        <div class="h-surah">${toLocal(h.s)}. ${nm} — ${toLocal(h.a)} নং আয়াত</div>
        <div class="h-detail">${h.j?`পারা ${toLocal(h.j)} • `:''}${h.n||'কোনো নোট নেই'}</div>
      </div>
      <div class="h-right">
        <div class="h-date">${h.d}</div>
        <button class="btn-del" onclick="delEntry(${i})" title="মুছুন">✕</button>
      </div>
    </div>`;
  }).join('');
}

function saveEntry() {
  const s = parseInt(document.getElementById('sel-surah').value);
  const a = parseInt(document.getElementById('sel-ayah').value);
  const j = parseInt(document.getElementById('sel-juz').value)||null;
  const n = document.getElementById('inp-note').value.trim();
  data.history.unshift({s,a,j,n,d:getToday(),dk:getTodayKey(),ts:Date.now()});
  if(data.history.length>60) data.history.pop();
  save();
  render();
  document.getElementById('form-panel').classList.remove('open');
  document.getElementById('inp-note').value='';
  toast('✦ আলহামদুলিল্লাহ! সংরক্ষিত হয়েছে');
}

function delEntry(i){
  data.history.splice(i,1);
  save();
  render();
  toast('রেকর্ড মুছে ফেলা হয়েছে');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

load();
init();
</script>
</body>
</html>
