<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>কুরআন তেলাওয়াত ট্র্যাকার</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Serif+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #C9A84C;
  --gold-light: #E8C97E;
  --gold-dark: #8B6914;
  --green-deep: #0D2818;
  --green-mid: #1B4332;
  --green-hover: #2D6A4F;
  --green-accent: #52B788;
  --cream: #F8F4E8;
  --cream-dark: #EDE8D5;
  --text-dim: rgba(248,244,232,0.55);
}

body {
  font-family: 'Noto Serif Bengali', serif;
  background: #0a1a0f;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 1rem;
}

.app {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(160deg, #0D2818 0%, #1B4332 50%, #0D2818 100%);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid rgba(201,168,76,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.gold-line {
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, var(--green-deep), var(--gold), var(--gold-light), var(--gold), var(--green-deep));
}

.header {
  text-align: center;
  padding: 1.5rem 1.5rem 0.8rem;
}

.bismillah {
  font-family: 'Amiri', serif;
  font-size: 2rem;
  color: var(--gold-light);
  letter-spacing: 3px;
  text-shadow: 0 0 25px rgba(201,168,76,0.25);
  margin-bottom: 0.5rem;
}

.app-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--cream);
  letter-spacing: 1px;
}

.app-sub {
  font-size: 0.75rem;
  color: var(--gold-light);
  opacity: 0.75;
  margin-top: 3px;
}

.divider {
  width: 70%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 0.9rem auto;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 0 1.2rem 1rem;
}

.stat-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 12px;
  padding: 0.7rem 0.4rem;
  text-align: center;
}

.stat-val {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--gold-light);
}

.stat-lbl {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 3px;
}

.section { padding: 0 1.2rem; margin-bottom: 1rem; }

.sec-title {
  font-size: 0.68rem;
  color: var(--gold);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, rgba(201,168,76,0.35), transparent);
}

.progress-wrap {
  background: rgba(255,255,255,0.08);
  border-radius: 6px;
  height: 7px;
  overflow: hidden;
  margin-bottom: 5px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green-accent), var(--gold));
  border-radius: 6px;
  transition: width 0.6s ease;
}
.progress-text {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--text-dim);
}

.current-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 14px;
  padding: 0.9rem 1rem;
  display: flex;
  align-items: center;
  gap: 0.9rem;
  position: relative;
  overflow: hidden;
}
.current-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--green-accent));
}

.cur-icon {
  width: 44px;
  height: 44px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.cur-info { flex: 1; min-width: 0; }
.cur-para {
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cur-detail { font-size: 0.72rem; color: var(--text-dim); margin-top: 2px; }
.cur-date { font-size: 0.65rem; color: var(--gold-light); opacity: 0.7; margin-top: 3px; }

.btn-update {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 8px;
  color: var(--gold-light);
  padding: 6px 12px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  flex-shrink: 0;
}
.btn-update:hover { background: rgba(201,168,76,0.28); }

.form-panel {
  background: rgba(0,0,0,0.22);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 14px;
  padding: 1rem;
  margin-top: 10px;
  display: none;
}
.form-panel.open { display: block; }

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-lbl {
  font-size: 0.68rem;
  color: var(--gold-light);
  opacity: 0.8;
}

select, input[type="text"] {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(201,168,76,0.22);
  border-radius: 8px;
  color: var(--cream);
  padding: 8px 10px;
  font-size: 0.8rem;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
select option { background: #1B4332; }
select:focus, input:focus { border-color: rgba(201,168,76,0.55); }

.auto-field {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 8px;
  color: var(--cream);
  padding: 8px 10px;
  font-size: 0.8rem;
  font-family: inherit;
  width: 100%;
}

.btn-save {
  width: 100%;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold));
  border: none;
  border-radius: 10px;
  color: #1A1A08;
  padding: 10px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
  transition: opacity 0.2s;
  margin-top: 4px;
}
.btn-save:hover { opacity: 0.88; }

.empty {
  text-align: center;
  padding: 1.5rem;
  color: rgba(248,244,232,0.3);
  font-size: 0.78rem;
  line-height: 1.9;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green-hover);
  border: 1px solid var(--gold);
  color: var(--cream);
  padding: 9px 20px;
  border-radius: 30px;
  font-size: 0.78rem;
  font-family: 'Noto Serif Bengali', serif;
  transition: transform 0.3s ease;
  z-index: 100;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

.bottom-space { height: 1.5rem; }
</style>
</head>
<body>
<div class="app">
  <div class="gold-line"></div>

  <div class="header">
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <div class="app-title">কুরআন তেলাওয়াত ট্র্যাকার</div>
    <div class="app-sub">হাফেজি পারা ও পৃষ্ঠা অনুযায়ী ট্র্যাক</div>
  </div>

  <div class="divider"></div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-val" id="st-juz">০/৩০</div>
      <div class="stat-lbl">সম্পূর্ণ পারা</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="st-page">০/৬০৪</div>
      <div class="stat-lbl">সম্পূর্ণ পৃষ্ঠা</div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">সামগ্রিক অগ্রগতি</div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <div class="progress-text">
      <span id="prog-lbl">শুরু হয়নি</span>
      <span id="prog-pct">০%</span>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">বর্তমান অবস্থান</div>
    <div class="current-card">
      <div class="cur-icon">📖</div>
      <div class="cur-info">
        <div class="cur-para" id="cur-para">এখনও শুরু করা হয়নি</div>
        <div class="cur-detail" id="cur-detail">পারা ও পৃষ্ঠা নির্বাচন করুন</div>
        <div class="cur-date" id="cur-date">—</div>
      </div>
      <button class="btn-update" onclick="toggleForm()">আপডেট</button>
    </div>

    <div class="form-panel" id="form-panel">
      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl">পারা (জুয)</label>
          <select id="sel-juz" onchange="updatePages()"></select>
        </div>
        <div class="form-group">
          <label class="form-lbl">পৃষ্ঠা</label>
          <select id="sel-page" onchange="updateSurahAyah()"></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-lbl">সূরা</label>
          <div class="auto-field" id="auto-surah">—</div>
        </div>
        <div class="form-group">
          <label class="form-lbl">আয়াত</label>
          <div class="auto-field" id="auto-ayah">—</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="grid-column: 1/-1;">
          <label class="form-lbl">নোট (ঐচ্ছিক)</label>
          <input type="text" id="inp-note" placeholder="যেমন: ফজরের পরে, তারবিয়াত" maxlength="50">
        </div>
      </div>
      <button class="btn-save" onclick="saveEntry()">✦ সংরক্ষণ করুন</button>
    </div>
  </div>

  <div class="gold-line"></div>
  <div class="bottom-space"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// হাফেজি সিস্টেম ম্যাপিং (পারা: প্রতিটি পারায় 20 পৃষ্ঠা)
const JUZ_DATA = {
  1: {pages: 20, surah: 1, startAyah: 1},
  2: {pages: 20, surah: 1, startAyah: 142},
  3: {pages: 20, surah: 2, startAyah: 253},
  4: {pages: 20, surah: 3, startAyah: 93},
  5: {pages: 20, surah: 4, startAyah: 1},
  6: {pages: 20, surah: 4, startAyah: 148},
  7: {pages: 20, surah: 5, startAyah: 82},
  8: {pages: 20, surah: 6, startAyah: 111},
  9: {pages: 20, surah: 7, startAyah: 88},
  10: {pages: 20, surah: 8, startAyah: 41},
  11: {pages: 20, surah: 9, startAyah: 93},
  12: {pages: 20, surah: 10, startAyah: 26},
  13: {pages: 20, surah: 11, startAyah: 6},
  14: {pages: 20, surah: 12, startAyah: 54},
  15: {pages: 20, surah: 13, startAyah: 44},
  16: {pages: 20, surah: 16, startAyah: 1},
  17: {pages: 20, surah: 17, startAyah: 1},
  18: {pages: 20, surah: 18, startAyah: 75},
  19: {pages: 20, surah: 19, startAyah: 1},
  20: {pages: 20, surah: 21, startAyah: 1},
  21: {pages: 20, surah: 22, startAyah: 79},
  22: {pages: 20, surah: 24, startAyah: 65},
  23: {pages: 20, surah: 26, startAyah: 1},
  24: {pages: 20, surah: 27, startAyah: 94},
  25: {pages: 20, surah: 29, startAyah: 1},
  26: {pages: 20, surah: 33, startAyah: 31},
  27: {pages: 20, surah: 36, startAyah: 84},
  28: {pages: 20, surah: 40, startAyah: 1},
  29: {pages: 20, surah: 46, startAyah: 36},
  30: {pages: 20, surah: 51, startAyah: 1}
};

const SURAHS = [
  ["আল-ফাতিহা",7],["আল-বাকারা",286],["আল-ইমরান",200],["আন-নিসা",176],["আল-মায়িদা",120],
  ["আল-আনআম",165],["আল-আরাফ",206],["আল-আনফাল",75],["আত-তাওবা",129],["ইউনুস",109],
  ["হুদ",123],["ইউসুফ",111],["আর-রাদ",43],["ইবরাহিম",52],["আল-হিজর",99],
  ["আন-নাহল",128],["আল-ইসরা",111],["আল-কাহফ",110],["মারইয়াম",98],["তা-হা",135],
  ["আল-আম্বিয়া",112],["আল-হাজ্জ",78],["আল-মুমিনুন",118],["আন-নুর",64],["আল-ফুরকান",77],
  ["আশ-শুআরা",227],["আন-নামল",93],["আল-কাসাস",88],["আল-আনকাবুত",69],["আর-রুম",60],
  ["লুকমান",34],["আস-সাজদা",30],["আল-আহজাব",73],["সাবা",54],["ফাতির",45],
  ["ইয়া-সিন",83],["আস-সাফফাত",182],["সাদ",88],["আয-যুমার",75],["গাফির",85],
  ["ফুসসিলাত",54],["আশ-শুরা",53],["আয-যুখরুফ",89],["আদ-দুখান",59],["আল-জাসিয়া",37],
  ["আল-আহকাফ",35],["মুহাম্মদ",38],["আল-ফাতহ",29],["আল-হুজুরাত",18],["কাফ",45],
  ["আয-যারিয়াত",60],["আত-তুর",49],["আন-নাজম",62],["আল-কামার",55],["আর-রাহমান",78],
  ["আল-ওয়াকিআ",96],["আল-হাদিদ",29],["আল-মুজাদিলা",22],["আল-হাশর",24],["আল-মুমতাহিনা",13],
  ["আস-সাফ",14],["আল-জুমুআ",11],["আল-মুনাফিকুন",11],["আত-তাগাবুন",18],["আত-তালাক",12],
  ["আত-তাহরিম",12],["আল-মুলক",30],["আল-কালাম",52],["আল-হাক্কা",52],["আল-মাআরিজ",44],
  ["নুহ",28],["আল-জিন",28],["আল-মুজ্জাম্মিল",20],["আল-মুদ্দাসির",56],["আল-কিয়ামা",40],
  ["আল-ইনসান",31],["আল-মুরসালাত",50],["আন-নাবা",40],["আন-নাযিআত",46],["আবাসা",42],
  ["আত-তাকবির",29],["আল-ইনফিতার",19],["আল-মুতাফফিফিন",36],["আল-ইনশিকাক",25],["আল-বুরুজ",22],
  ["আত-তারিক",17],["আল-আলা",19],["আল-গাশিয়া",26],["আল-ফাজর",30],["আল-বালাদ",20],
  ["আশ-শামস",15],["আল-লায়ল",21],["আদ-দুহা",11],["আশ-শারহ",8],["আত-তিন",8],
  ["আল-আলাক",19],["আল-কাদর",5],["আল-বাইয়িনা",8],["আয-যালযালা",8],["আল-আদিয়াত",11],
  ["আল-কারিআ",11],["আত-তাকাসুর",8],["আল-আসর",3],["আল-হুমাযা",9],["আল-ফিল",5],
  ["কুরাইশ",4],["আল-মাউন",7],["আল-কাউসার",3],["আল-কাফিরুন",6],["আন-নাসর",3],
  ["আল-মাসাদ",5],["আল-ইখলাস",4],["আল-ফালাক",5],["আন-নাস",6]
];

let data = { juz: 0, page: 0 };

function toLocal(num) {
  return num.toString().replace(/[0-9]/g, d => '০१२३४५६७८९'[d]);
}

function load() {
  try { const d = localStorage.getItem('qt_hafezi'); if(d) data = JSON.parse(d); } catch(e){}
}
function save() {
  try { localStorage.setItem('qt_hafezi', JSON.stringify(data)); } catch(e){}
}

function init() {
  const sj = document.getElementById('sel-juz');
  for(let i=1;i<=30;i++){
    const o = document.createElement('option');
    o.value = i; o.textContent = `পারা ${toLocal(i)}`;
    sj.appendChild(o);
  }
  updatePages();
  render();
}

function updatePages() {
  const juz = parseInt(document.getElementById('sel-juz').value);
  const pages = JUZ_DATA[juz]?.pages || 20;
  const sp = document.getElementById('sel-page');
  sp.innerHTML='';
  for(let i=1;i<=pages;i++){
    const o = document.createElement('option');
    o.value = i; o.textContent = `পৃষ্ঠা ${toLocal(i)}`;
    sp.appendChild(o);
  }
  updateSurahAyah();
}

function updateSurahAyah() {
  const juz = parseInt(document.getElementById('sel-juz').value);
  const page = parseInt(document.getElementById('sel-page').value);
  
  const juzData = JUZ_DATA[juz];
  if (!juzData) return;

  const surah = juzData.surah;
  const baseAyah = juzData.startAyah;
  const ayah = baseAyah + (page - 1) * 2;

  const surahName = SURAHS[surah - 1]?.[0] || '—';
  document.getElementById('auto-surah').textContent = `${toLocal(surah)}. ${surahName}`;
  document.getElementById('auto-ayah').textContent = `${toLocal(Math.max(ayah, 1))} নং`;
}

function toggleForm() {
  const f = document.getElementById('form-panel');
  f.classList.toggle('open');
  if(f.classList.contains('open')) {
    if(data.juz) document.getElementById('sel-juz').value = data.juz;
    updatePages();
    if(data.page) {
      document.getElementById('sel-page').value = data.page;
      updateSurahAyah();
    }
  }
}

function getToday() {
  return new Date().toLocaleDateString('bn-BD',{day:'numeric',month:'long',year:'numeric'});
}

function render() {
  if(data.juz && data.page) {
    document.getElementById('cur-para').textContent = `পারা ${toLocal(data.juz)} — পৃষ্ঠা ${toLocal(data.page)}`;
    const juzData = JUZ_DATA[data.juz];
    const surah = juzData.surah;
    const surahName = SURAHS[surah - 1]?.[0] || '—';
    const baseAyah = juzData.startAyah;
    const ayah = baseAyah + (data.page - 1) * 2;
    document.getElementById('cur-detail').textContent = `${toLocal(surah)}. ${surahName} — ${toLocal(Math.max(ayah, 1))} নং আয়াত`;
    document.getElementById('cur-date').textContent = data.date || '—';

    const totalPages = 604;
    const currentPageNum = (data.juz - 1) * 20 + data.page;
    const pct = Math.round((currentPageNum / totalPages) * 100);
    document.getElementById('prog-fill').style.width = pct+'%';
    document.getElementById('prog-pct').textContent = toLocal(pct)+'%';
    document.getElementById('prog-lbl').textContent = `${toLocal(currentPageNum)} / ৬০৪ পৃষ্ঠা`;
  }

  document.getElementById('st-juz').textContent = `${toLocal(data.juz)}/৩০`;
  const currentPageNum = (data.juz - 1) * 20 + data.page;
  document.getElementById('st-page').textContent = `${toLocal(currentPageNum)}/৬০৪`;
}

function saveEntry() {
  const juz = parseInt(document.getElementById('sel-juz').value);
  const page = parseInt(document.getElementById('sel-page').value);
  const note = document.getElementById('inp-note').value.trim();
  data.juz = juz;
  data.page = page;
  data.date = getToday();
  data.note = note;
  save();
  render();
  document.getElementById('form-panel').classList.remove('open');
  document.getElementById('inp-note').value='';
  toast('✦ আলহামদুলিল্লাহ! সংরক্ষিত হয়েছে');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

load();
init();
</script>
</body>
</html>
